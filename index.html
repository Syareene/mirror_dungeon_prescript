<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>RandomPackGenerator(LCB)</title>
</head>

<body>
    <h1>ランダムパック抽出</h1>
    階層を入力すると、その階層にあったパックがランダムで抽選されます。<br>
    これで君も名誉人差し指！<br>
    <br>

    <div>
        <label>数値入力 (1〜15):
            <input type="text" id="inputNumbers" placeholder="例: 1, 3-5 7　9-11" style="width: 300px;">
        </label>
        <button id="generateBtn">抽出する</button>
    </div>

    <div id="outputArea" style="margin-top: 20px; border: 1px solid #ccc; padding: 10px; min-height: 50px;">
    </div>

    <script src="main.js"></script>
</body>

</html>
