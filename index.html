<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
        <title>RandomPackGenerator(LCB)</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>

<body>
    <h1>ランダムパック抽出</h1>
    階層を入力すると、その階層にあったパックがランダムで抽選されます。<br>
    これで君も名誉人差し指！<br>
    <br>

    <div>
        <label>数値入力 (1〜15):
            <input type="text" id="inputNumbers" placeholder="例: 1, 3-5 7　9-11" style="width: 300px;">
        </label>
        <button id="generateBtn">抽出する</button>
    </div>

    <div id="outputArea">
        <div class="group-container" id="group1to5">
            <h2>1-5</h2>
            <div class="slots"></div>
        </div>
    
        <div class="group-container" id="group6to10">
            <h2>6-10</h2>
            <div class="slots"></div>
        </div>
    
        <div class="group-container" id="group11to15">
            <h2>11-15</h2>
            <div class="slots"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
